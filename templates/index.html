<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }
        .btn-predict {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card p-5 bg-white">
                    <div class="text-center mb-5">
                        <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                        <h1 class="display-5 fw-bold text-primary">AI Student Performance Predictor</h1>
                        <p class="lead text-muted">Higher Education Grade Prediction System</p>
                    </div>

                    <form id="predictForm">
                        <div class="row g-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Gender</label>
                                <select class="form-control" name="Gender" required>
                                    <option value="0">Female</option>
                                    <option value="1">Male</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Age</label>
                                <input type="number" class="form-control" name="Age" value="18" required>
                            </div>
                            <div class="col-md-4">
    <label class="form-label fw-bold">Ethnicity (Nigeria)</label>
    <select class="form-control" name="Ethnicity" required>
        <option value="0">Yoruba</option>
        <option value="1">Igbo</option>
        <option value="2" selected>Hausa/Fulani</option>
        <option value="3">Ijaw</option>
        <option value="4">Ibibio</option>
        <option value="5">Tiv</option>
        <option value="6">Other Nigerian</option>
        <option value="7">Non-Nigerian</option>
    </select>
</div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Weekly Study Time (hrs)</label>
                                <input type="number" class="form-control" name="StudyTimeWeekly" value="20" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Absences</label>
                                <input type="number" class="form-control" name="Absences" value="2" required>
                            </div>

                            <div class="col-md-6">
    <label class="form-label fw-bold">Parental Education Level</label>
    <select class="form-control" name="ParentalEducation" required>
        <option value="0">None</option>
        <option value="1">Primary School</option>
        <option value="2">Secondary School</option>
        <option value="3">ND / NCE</option>
        <option value="4">HND</option>
        <option value="5" selected>BSc / BA</option>
        <option value="6">MSc / MA</option>
        <option value="7">PhD</option>
    </select>
</div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Parental Support (0-4)</label>
                                <input type="number" class="form-control" name="ParentalSupport" value="4" min="0" max="4" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tutoring</label>
                                <select class="form-control" name="Tutoring" required>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Extracurricular</label>
                                <select class="form-control" name="Extracurricular" required>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Sports</label>
                                <select class="form-control" name="Sports" required>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Music</label>
                                <select class="form-control" name="Music" required>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Volunteering</label>
                                <select class="form-control" name="Volunteering" required>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">GPA</label>
                                <input type="number" class="form-control" name="GPA" value="3.2" step="0.1" required>
                            </div>

                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn btn-predict text-white fw-bold w-100">
                                    <i class="fas fa-magic"></i> Predict Grade Class
                                </button>
                            </div>
                        </div>
                    </form>

                    <div id="result" class="mt-5"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('predictForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `
                <div class="text-center">
                    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
                    <p class="mt-3">Analyzing student data...</p>
                </div>
            `;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.predicted_grade) {
                    resultDiv.innerHTML = `
                        <div class="alert alert-success text-center p-4">
                            <h4>Predicted Grade: <strong>${data.predicted_grade}</strong></h4>
                            <p class="mb-3">Confidence: <strong>${data.confidence}%</strong></p>
                            <a href="${data.pdf_path}" class="btn btn-success" download>
                                <i class="fas fa-download"></i> Download Professional PDF Report
                            </a>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-danger">Error occurred. Please try again.</div>`;
            }
        });
    </script>
</body>
</html>
